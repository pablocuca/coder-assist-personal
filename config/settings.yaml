# Modo de operação:
#   offline   — só Ollama; o provider Claude nem é registrado (nenhuma chamada
#               externa possível). Para implantação corporativa sem aprovação
#               de tráfego externo.
#   provider  — Ollama + Claude via Claude Code CLI pessoal (`claude login`).
#   corporate — Ollama + Claude via endpoint sancionado pela organização
#               (configure providers.claude.corporate abaixo).
mode: provider

providers:
  default: ollama
  ollama:
    base_url: http://localhost:11434
    model: gpt-oss:20b
    timeout_seconds: 120
    max_retries: 2
    context_window_tokens: 8192    # janela útil do modelo local (política de escalada)
  claude:
    binary: claude                 # deve estar no PATH (npm i -g @anthropic-ai/claude-code)
    model: claude-sonnet-4-6       # passado via --model
    timeout_seconds: 300
    max_turns: 1                   # uma resposta, sem loop agêntico
    max_budget_usd: 0.50           # teto por chamada via --max-budget-usd
    # Autenticação: gerenciada pelo próprio Claude Code (claude login).
    # Esta ferramenta NUNCA armazena ou manipula API keys.
    pricing:                       # SÓ para a estimativa exibida antes de escalar;
      input_usd_per_mtok: 3.00     # o custo real vem do total_cost_usd do output JSON
      output_usd_per_mtok: 15.00
      overhead_tokens: 23000       # sistema do Claude Code, presente em toda chamada
    corporate:                     # usado apenas com mode: corporate
      model: ""                    # id do modelo no endpoint (ex.: us.anthropic.claude-sonnet-4-6-v1:0)
      env: {}                      # vars injetadas na chamada do binário, ex.:
      # env:                       #   AWS Bedrock:
      #   CLAUDE_CODE_USE_BEDROCK: "1"
      #   AWS_REGION: us-east-1
      # env:                       #   Google Vertex:
      #   CLAUDE_CODE_USE_VERTEX: "1"
      #   CLOUD_ML_REGION: us-east5
      #   ANTHROPIC_VERTEX_PROJECT_ID: meu-projeto-gcp
      # env:                       #   Gateway interno (ex.: LiteLLM):
      #   ANTHROPIC_BASE_URL: https://llm-gateway.empresa.com

router:
  confidence_threshold: 0.60
  auto_escalate: false             # se true, escala sem perguntar
  confirm_cost_before_claude: true

embeddings:
  model: nomic-embed-text
  chunk_max_lines: 80
  chunk_overlap_lines: 10

editing:
  require_approval: true           # não pode ser desativado no MVP/V1
  backup_retention: 20             # backups por arquivo
  max_file_size_kb: 512            # arquivos maiores exigem confirmação

indexing:
  include: ["*.dart", "*.py", "*.ts", "*.js", "*.md", "*.yaml", "*.json"]
  respect_gitignore: true
  extra_ignores: [".git/", "build/", "node_modules/", ".dart_tool/", "venv/", ".venv/", "dist/", "target/", "db/", "backups/", "indexes/", "logs/"]
  max_indexed_file_kb: 256

logging:
  level: INFO
  format: json
  redact_secrets: true

git:
  auto_commit: false               # commit apenas via comando explícito
